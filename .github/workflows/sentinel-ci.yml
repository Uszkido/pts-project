name: PTS Sentinel CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install Frontend Dependencies
      run: cd frontend && npm install --legacy-peer-deps

    - name: Type Check & Linting Sentinel Dashboards
      run: |
        cd frontend
        npm run lint --if-present

    - name: Install Backend Environment
      run: cd backend && npm install

    - name: Execute Security & Auth Pipeline Checks
      run: |
        echo "Running virtual Red Team attack scenarios on backend..."
        # If any tests fail, the workflow blocks Vercel deployment automatically.
        # Ensure 'npm test' is defined in the backend/package.json
        cd backend && npm test --if-present

    - name: Security Audit
      run: cd backend && npm audit --audit-level=high || true
